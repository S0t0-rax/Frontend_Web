<div class="staff-card">
  <h3>Gestión de Personal</h3>

  <div *ngIf="isLoading()" class="loading">Cargando personal...</div>

  <div *ngIf="!isLoading()">
    <div class="staff-list">
      <div *ngFor="let s of staff()" class="staff-item">
        <div class="si-left">
          <div class="avatar">{{ (s.full_name || s.email).split(' ').map(n=>n[0]).slice(0,2).join('') }}</div>
        </div>
        <div class="si-body">
          <div class="si-title">{{ s.full_name || 'Sin nombre' }} <span class="email">{{ s.email }}</span></div>
          <div class="si-meta">
            <span class="phone">{{ s.phone || '-' }}</span>
            <span class="status" [class.busy]="s.is_busy" [class.free]="!s.is_busy">{{ s.is_busy ? 'Ocupado' : 'Disponible' }}</span>
          </div>
        </div>
        <div class="si-right">
          <ng-container *ngIf="editingId !== s.id; else editBlock">
            <div class="workshop-pill">{{ s.workshop_name || '-' }}</div>
            <button class="btn-link small" (click)="startEditAssignment(s)">Editar</button>
          </ng-container>
          <ng-template #editBlock>
            <select [(ngModel)]="editingWorkshopSelection" [ngModelOptions]="{standalone: true}" class="theme-input small-select">
              <option [ngValue]="null">Sin asignar</option>
              <option *ngFor="let w of workshops" [ngValue]="w.id">{{ w.name }}</option>
            </select>
            <div class="edit-actions">
              <button class="btn-primary small" (click)="saveAssignment(s)">Guardar</button>
              <button class="btn-secondary small" (click)="cancelEditAssignment()">Cancelar</button>
            </div>
          </ng-template>
        </div>
      </div>
    </div>

    <div class="create-section">
      <h4>Crear Mecánico</h4>
      <form [formGroup]="createForm" (ngSubmit)="createMechanic()">
        <div class="row">
          <input formControlName="full_name" placeholder="Nombre completo">
          <input formControlName="email" placeholder="Correo">
        </div>
        <div class="row">
          <input formControlName="phone" placeholder="Teléfono (opcional)">
          <input type="password" formControlName="password" placeholder="Contraseña inicial">
        </div>
        <div class="row">
          <label class="field-label">Asignar a Taller</label>
          <select formControlName="workshop_id" class="theme-input">
            <option [ngValue]="null">Sin asignar</option>
            <option *ngFor="let w of workshops" [ngValue]="w.id">{{ w.name }}</option>
          </select>
        </div>
        <button type="submit" [disabled]="isCreating()">{{ isCreating() ? 'Creando...' : 'Crear Mecánico' }}</button>
      </form>
    </div>
  </div>

  <div *ngIf="message().text" class="msg" [ngClass]="message().type">{{ message().text }}</div>
</div>
