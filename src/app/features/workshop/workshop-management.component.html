<div class="min-h-screen bg-gray-50">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Gestión de Taller</h1>
      <p class="text-gray-600 mt-2">Administra los datos de tu taller mecánico</p>
    </div>

    <!-- Tabs -->
    <div class="flex space-x-4 mb-8 border-b border-gray-200">
      <button
        (click)="activeTab.set('info')"
        [ngClass]="{
          'border-b-2 border-green-600 text-green-600': activeTab() === 'info',
          'text-gray-600': activeTab() !== 'info'
        }"
        class="pb-4 font-semibold transition"
      >
        Información del Taller
      </button>
      <button
        (click)="activeTab.set('services')"
        [ngClass]="{
          'border-b-2 border-green-600 text-green-600': activeTab() === 'services',
          'text-gray-600': activeTab() !== 'services'
        }"
        class="pb-4 font-semibold transition"
      >
        Servicios
      </button>
    </div>

    <!-- Info Tab -->
    <div *ngIf="activeTab() === 'info'" class="bg-white rounded-lg shadow p-8">
      <form [formGroup]="workshopForm" (ngSubmit)="updateWorkshop()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Nombre del Taller</label>
            <input
              type="text"
              formControlName="name"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Email</label>
            <input
              type="email"
              formControlName="email"
              [disabled]="true"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg bg-gray-100"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Teléfono</label>
            <input
              type="tel"
              formControlName="phone"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Ubicación</label>
            <input
              type="text"
              formControlName="location"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Capacidad (Autos)</label>
            <input
              type="number"
              formControlName="capacity"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
              min="1"
            />
          </div>
        </div>

        <div *ngIf="error()" class="mt-4 bg-red-50 border-l-4 border-red-500 p-4 rounded">
          <p class="text-red-700">{{ error() }}</p>
        </div>

        <div *ngIf="success()" class="mt-4 bg-green-50 border-l-4 border-green-500 p-4 rounded">
          <p class="text-green-700">{{ success() }}</p>
        </div>

        <button
          type="submit"
          [disabled]="updating()"
          class="mt-6 bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white font-bold py-2 px-6 rounded-lg transition"
        >
          {{ updating() ? 'Actualizando...' : 'Guardar Cambios' }}
        </button>
      </form>
    </div>

    <!-- Services Tab -->
    <div *ngIf="activeTab() === 'services'" class="bg-white rounded-lg shadow p-8">
      <h2 class="text-xl font-bold text-gray-900 mb-6">Servicios de tu Taller</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div *ngFor="let service of workshopServices()" class="border-2 border-gray-300 rounded-lg p-4">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="font-bold text-gray-900">{{ service.service?.name }}</h3>
              <p class="text-gray-600 text-sm mt-1">Precio: ${{ service.price }}</p>
              <p class="text-gray-600 text-sm">Duración: {{ service.estimatedDuration }}</p>
            </div>
            <button
              (click)="removeService(service.id)"
              class="text-red-600 hover:text-red-800 font-bold"
            >
              ✕
            </button>
          </div>
        </div>
      </div>

      <div class="border-t pt-6">
        <h3 class="text-lg font-bold text-gray-900 mb-4">Añadir Nuevo Servicio</h3>
        <form [formGroup]="serviceForm" (ngSubmit)="addService()" class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Servicio</label>
            <select
              formControlName="serviceId"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
            >
              <option value="">Selecciona un servicio</option>
              <option *ngFor="let svc of availableServices()" [value]="svc.id">
                {{ svc.name }}
              </option>
            </select>
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Precio</label>
            <input
              type="number"
              formControlName="price"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
              placeholder="0.00"
              step="0.01"
              min="0"
            />
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Duración (ej: 2 horas)</label>
            <input
              type="text"
              formControlName="duration"
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
              placeholder="2 horas"
            />
          </div>

          <button
            type="submit"
            [disabled]="addingService()"
            class="md:col-span-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-2 px-6 rounded-lg transition"
          >
            {{ addingService() ? 'Añadiendo...' : 'Añadir Servicio' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
